{% extends "base.html" %}
{% block title %}Connexion Équipe{% endblock %}

{% block extra_css %}
<style>
    .login-wrapper {
        max-width: 420px;
        margin: 3rem auto;
    }
    .login-card {
        background: white;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        text-align: center;
    }
    .login-card .icone { font-size: 3rem; margin-bottom: 0.5rem; }
    .login-card h2 { font-size: 1.4rem; margin-bottom: 0.3rem; }
    .login-card .sous-titre { color: #718096; font-size: 0.9rem; margin-bottom: 2rem; }
    .login-card .form-group { text-align: left; }
    .login-card .btn-green { width: 100%; padding: 0.8rem; font-size: 1rem; margin-top: 0.5rem; }
    .login-hint {
        margin-top: 1.5rem;
        padding: 0.8rem;
        background: #f0fdf4;
        border-radius: 8px;
        font-size: 0.83rem;
        color: #065f46;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="icone">🔐</div>
        <h2>Espace Équipe</h2>
        <p class="sous-titre">Réservé aux agents autorisés</p>

        <form method="POST">
            <div class="form-group">
                <label>Identifiant</label>
                <input type="text" name="identifiant" required placeholder="Votre identifiant">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="mot_de_passe" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-green">Se connecter</button>
        </form>

        <div class="login-hint">
            💡 Identifiant par défaut : <strong>admin</strong> / <strong>admin123</strong><br>
            (À changer en production !)
        </div>
    </div>
</div>
{% endblock %}
